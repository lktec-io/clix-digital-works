<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0A2342"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo mark -->
  <rect x="80" y="220" width="90" height="90" rx="20" fill="url(#accent)"/>
  <text x="125" y="285" font-family="Arial Black, Arial, sans-serif" font-size="54"
    font-weight="900" text-anchor="middle" fill="#050816">C</text>

  <!-- Company name -->
  <text x="195" y="262" font-family="Arial, sans-serif" font-size="42"
    font-weight="900" fill="#FFFFFF" letter-spacing="-1">Clix</text>
  <text x="195" y="300" font-family="Arial, sans-serif" font-size="20"
    font-weight="400" fill="#B8C4D6" letter-spacing="2">Digital Works</text>

  <!-- Divider -->
  <rect x="80" y="340" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Headline -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="40"
    font-weight="900" fill="#FFFFFF">Software Engineering &amp;</text>
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="40"
    font-weight="900" fill="#FFFFFF">Digital Transformation</text>

  <!-- Tagline -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="20"
    font-weight="400" fill="#6B7FA3">Innovate • Create • Connect • Grow</text>

  <!-- Location -->
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="16"
    font-weight="400" fill="#39FF14">📍 Mbeya, Tanzania</text>

  <!-- Right side decoration -->
  <circle cx="950" cy="315" r="160" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <circle cx="950" cy="315" r="120" stroke="#39FF14" stroke-width="1" stroke-opacity="0.1" fill="none" stroke-dasharray="6 4"/>
  <circle cx="950" cy="315" r="80"  stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.2" fill="none"/>
  <circle cx="950" cy="315" r="40"  fill="rgba(10,35,66,0.6)" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="950" y="323" font-family="Arial Black, Arial, sans-serif" font-size="20"
    font-weight="900" text-anchor="middle" fill="#00E5FF">CDW</text>

  <!-- Service pills -->
  <rect x="730" y="462" width="130" height="32" rx="16" fill="rgba(57,255,20,0.12)" stroke="#39FF14" stroke-width="1" stroke-opacity="0.4"/>
  <text x="795" y="483" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#39FF14">Web Dev</text>

  <rect x="876" y="462" width="130" height="32" rx="16" fill="rgba(0,229,255,0.12)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="941" y="483" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#00E5FF">Mobile Apps</text>

  <rect x="1022" y="462" width="100" height="32" rx="16" fill="rgba(57,255,20,0.12)" stroke="#39FF14" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1072" y="483" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#39FF14">AI / ML</text>

  <rect x="730" y="506" width="100" height="32" rx="16" fill="rgba(0,229,255,0.12)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="780" y="527" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#00E5FF">ERP</text>

  <rect x="846" y="506" width="140" height="32" rx="16" fill="rgba(57,255,20,0.12)" stroke="#39FF14" stroke-width="1" stroke-opacity="0.4"/>
  <text x="916" y="527" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#39FF14">Cybersecurity</text>

  <rect x="1002" y="506" width="120" height="32" rx="16" fill="rgba(0,229,255,0.12)" stroke="#00E5FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1062" y="527" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#00E5FF">Cloud / VPS</text>
</svg>
