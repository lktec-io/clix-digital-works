<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0A2342"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#050816"/>
  <!-- Gradient filled rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#grad)"/>
  <!-- Letter C -->
  <text
    x="32"
    y="46"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="36"
    font-weight="900"
    text-anchor="middle"
    fill="url(#gradText)"
    letter-spacing="-1"
  >C</text>
</svg>
